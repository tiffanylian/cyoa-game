<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansion of Shadows - Horror Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Blood Splatters -->
    <svg class="blood-splatter splatter-1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,20 Q70,15 75,35 Q80,50 65,60 Q50,70 35,65 Q25,55 30,40 Q35,20 50,20 M30,50 Q20,55 15,45 M70,50 Q85,55 90,45" fill="#c41e3a" opacity="0.7"/>
    </svg>
    <svg class="blood-splatter splatter-2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,15 Q75,10 80,40 Q75,70 50,75 Q30,70 25,40 Q30,10 50,15 M20,45 Q10,40 8,55 M80,45 Q90,40 92,55" fill="#ff4444" opacity="0.6"/>
    </svg>
    <svg class="blood-splatter splatter-3" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M45,25 Q65,20 70,45 Q65,65 45,70 Q30,65 28,45 Q32,20 45,25" fill="#c41e3a" opacity="0.5"/>
    </svg>

    <div class="container">
        <header>
            <h1>🏚️ MANSION OF SHADOWS 🏚️</h1>
            <p>An AI-Powered Horror Adventure</p>
        </header>

        <main>
            <!-- Briefing Section -->
            <section id="briefing-section" class="briefing">
                <div class="briefing-content">
                    <h2>DISPATCH BRIEFING</h2>
                    <pre>{{ briefing }}</pre>
                    <button id="start-button" class="btn btn-primary">Enter the Mansion</button>
                </div>
            </section>

            <!-- Game Section -->
            <section id="game-section" class="game-container" style="display: none;">
                <!-- Scene Display -->
                <div class="scene-panel">
                    <div id="scene-content" class="scene-text">
                        <p>[Loading scene...]</p>
                    </div>
                </div>

                <!-- Game Stats -->
                <div class="stats-panel">
                    <div class="stat">
                        <label>TURN:</label>
                        <span id="turn-counter">0</span>
                    </div>
                </div>

                <!-- Player Input -->
                <div class="input-panel">
                    <form id="action-form" onsubmit="submitAction(event)">
                        <input 
                            type="text" 
                            id="action-input" 
                            placeholder="What do you do?" 
                            autocomplete="off"
                            disabled
                        >
                        <button type="submit" class="btn btn-action" disabled>Submit</button>
                    </form>
                </div>

                <!-- Game Over Screen -->
                <div id="game-over-screen" class="game-over" style="display: none;">
                    <div class="game-over-content">
                        <h2 id="outcome-title">GAME OVER</h2>
                        <p id="outcome-message"></p>
                        <button id="restart-button" class="btn btn-primary">Play Again</button>
                    </div>
                </div>
            </section>

            <!-- Loading Indicator -->
            <div id="loading-indicator" class="loading" style="display: none;">
                <p>The story unfolds...</p>
                <div class="spinner"></div>
            </div>
        </main>

        <footer>
            <p>An immersive AI-generated horror experience</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
